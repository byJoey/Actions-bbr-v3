name: 构建带有BBRv3的内核

on:
  workflow_dispatch:

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: 删除旧的工作流运行记录
        continue-on-error: true
        uses: Mattraks/delete-workflow-runs@main
        with:
          retain_days: 0
          keep_minimum_runs: 0

  build:
    needs: cleanup
    strategy:
      matrix:
        include:
          - arch: x86_64
            runs_on: ubuntu-latest
          - arch: arm64
            runs_on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs_on }}
    env:
      ARCH: ${{ matrix.arch }}
      KERNEL_VERSION: ""
    steps:
      - name: 获取内核版本
        id: get_kernel_version
        run: |
          version=$(curl -s https://www.kernel.org \
            | grep -A1 -m1 "stable:" \
            | grep -oP '\d+\.\d+\.\d+')
          echo "KERNEL_VERSION=$version" >> $GITHUB_ENV

      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装依赖项
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git build-essential \
            libncurses-dev libssl-dev libelf-dev libdw-dev \
            bison bc flex rsync debhelper \
            dpkg-dev fakeroot kmod cpio dwarves \
            lz4 zstd xz-utils curl jq

      - name: 创建源码目录
        run: mkdir -p ./kernel/linux

      - name: 下载内核源代码
        working-directory: ./kernel
        run: |
          branch=$(echo "${{ env.KERNEL_VERSION }}" | grep -oP '^\d+\.\d+')
          git clone --depth=1 --branch linux-$branch.y \
            https://github.com/gregkh/linux.git linux

      - name: 使用 stable 基线自带 BBR 实现
        working-directory: ./kernel/linux
        run: |
          # Keep upstream linux-stable tree untouched to avoid API mismatch.
          test -f net/ipv4/tcp_bbr.c

      - name: 编译声明
        working-directory: ./kernel/linux
        run: |
          grep -v "MODULE_DESCRIPTION" net/ipv4/tcp_bbr.c > net/ipv4/tcp_bbr.c.tmp
          mv net/ipv4/tcp_bbr.c.tmp net/ipv4/tcp_bbr.c
          
          echo 'MODULE_DESCRIPTION("TCP BBR v3 (Bottleneck Bandwidth and RTT) - Compiled & Optimized by Joey");' >> net/ipv4/tcp_bbr.c
          
          tail -n 5 net/ipv4/tcp_bbr.c

      - name: 准备 .config 并禁用证书检查
        working-directory: ./kernel/linux
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            curl -sSL https://raw.githubusercontent.com/byJoey/Actions-bbr-v3/main/arm64.config > .config
          else
            curl -sSL https://raw.githubusercontent.com/byJoey/Actions-bbr-v3/main/x86-64.config > .config
          fi

          scripts/config --disable SYSTEM_TRUSTED_KEYS
          scripts/config --disable SYSTEM_REVOCATION_KEYS
          # Mitigation for CVE-2026-31431 attack surface: do not expose userspace AEAD API.
          scripts/config --disable CRYPTO_USER_API_AEAD
          # Ensure BTF metadata is available for eBPF CO-RE userspace.
          scripts/config --disable DEBUG_INFO_NONE
          scripts/config --enable DEBUG_INFO
          scripts/config --enable DEBUG_INFO_DWARF_TOOLCHAIN_DEFAULT
          scripts/config --enable DEBUG_INFO_BTF
          scripts/config --enable DEBUG_INFO_BTF_MODULES
          
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            make ARCH=arm64 olddefconfig
          else
            make olddefconfig
          fi

          # Enforce CI security gate so vulnerable config never gets released.
          if ! grep -q '^# CONFIG_CRYPTO_USER_API_AEAD is not set' .config; then
            echo "ERROR: CONFIG_CRYPTO_USER_API_AEAD is enabled; refusing to continue."
            exit 1
          fi

          if ! grep -q '^CONFIG_DEBUG_INFO_BTF=y' .config; then
            echo "ERROR: CONFIG_DEBUG_INFO_BTF is not enabled; refusing to continue."
            exit 1
          fi

      - name: 安全自检（阻断 CVE-2026-31431 风险发布）
        working-directory: ./kernel/linux
        run: |
          set -euo pipefail

          echo "[SECURITY] checking CRYPTO_USER_API_AEAD state..."
          state="$(scripts/config --state CRYPTO_USER_API_AEAD || true)"
          if [ "$state" != "n" ]; then
            echo "[SECURITY][FAIL] CRYPTO_USER_API_AEAD state is '$state' (expected 'n')"
            exit 1
          fi

          if grep -n '^CONFIG_CRYPTO_USER_API_AEAD=' .config; then
            echo "[SECURITY][FAIL] .config still enables CRYPTO_USER_API_AEAD"
            exit 1
          fi

          if ! grep -q '^CONFIG_DEBUG_INFO_BTF=y' .config; then
            echo "[SECURITY][FAIL] CONFIG_DEBUG_INFO_BTF is not enabled."
            exit 1
          fi

          # Check upstream-fix code shape for CVE-2026-31431 in AF_ALG interfaces.
          if ! grep -Eq 'af_alg_count_tsgl\(struct sock \*sk, size_t bytes\);' include/crypto/if_alg.h; then
            echo "[SECURITY][FAIL] CVE-2026-31431 fix signature check failed (af_alg_count_tsgl)."
            exit 1
          fi
          if ! grep -Eq 'af_alg_pull_tsgl\(struct sock \*sk, size_t used, struct scatterlist \*dst\);' include/crypto/if_alg.h; then
            echo "[SECURITY][FAIL] CVE-2026-31431 fix signature check failed (af_alg_pull_tsgl)."
            exit 1
          fi

          echo "[SECURITY][PASS] CRYPTO_USER_API_AEAD disabled and BTF enabled; release can continue."

      - name: 构建内核 Debian 包
        working-directory: ./kernel/linux
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            make ARCH=arm64 bindeb-pkg -j$(nproc) LOCALVERSION=-joeyblog-bbrv3 KDEB_COMPRESS=gzip
          else
            make bindeb-pkg -j$(nproc) LOCALVERSION=-joeyblog-bbrv3 KDEB_COMPRESS=gzip
          fi

      - name: 上传配置文件
        uses: actions/upload-artifact@v4
        with:
          name: config-${{ matrix.arch }}
          path: ./kernel/linux/.config

      - name: 上传 deb 包
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.arch }}
          path: ./kernel/linux-*.deb

      - name: 发布到 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ matrix.arch }}-${{ env.KERNEL_VERSION }}
          files: ./kernel/linux-*.deb
          body: "带有 BBRv3 的最新内核，适用于 ${{ matrix.arch }} 架构。Compiled & Optimized by Joey."
