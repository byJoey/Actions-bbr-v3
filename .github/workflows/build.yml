# 工作流名称
name: 为最新内核打上BBRv3补丁并构建

on:
  workflow_dispatch:

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: 删除旧的工作流运行记录
        uses: Mattraks/delete-workflow-runs@v0.0.3
        with:
          retain_days: 0
          keep_minimum_runs: 1

  build:
    needs: cleanup
    strategy:
      fail-fast: false
      matrix:
        include:
          # 为 Debian/Ubuntu 构建 .deb 包
          - arch: x86_64
            distro: debian
            runs_on: ubuntu-latest
          - arch: arm64
            distro: debian
            runs_on: ubuntu-latest # 更改为 ubuntu-latest，如果需要特定的 ARM64 运行器，请考虑自托管或等待官方支持
          
          # 为 Fedora/CentOS/RHEL 构建 .rpm 包
          - arch: x86_64
            distro: rpm
            runs_on: ubuntu-latest

    runs-on: ${{ matrix.runs_on }}
    env:
      ARCH: ${{ matrix.arch }}
      DISTRO: ${{ matrix.distro }}
      LOCALVERSION: -joeyblog-bbrv3

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装依赖项
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git build-essential libncurses-dev libssl-dev libelf-dev \
            bison bc flex rsync fakeroot kmod cpio dwarves \
            lz4 zstd xz-utils curl jq patch
          
          if [ "${{ matrix.distro }}" = "debian" ]; then
            sudo apt-get install -y dpkg-dev
          elif [ "${{ matrix.distro }}" = "rpm" ]; then
            sudo apt-get install -y rpm-build
          fi

      - name: 获取最新稳定版内核信息
        id: get_kernel_info
        run: |
          # 从 kernel.org 获取最新的稳定版版本号
          STABLE_VERSION=$(curl -s https://www.kernel.org/releases.json | jq -r '.latest_stable.version')
          # 提取主版本号，如 6.9
          MAJOR_VERSION=$(echo "$STABLE_VERSION" | awk -F. '{print $1"."$2}')
          
          echo "最新稳定版内核: $STABLE_VERSION"
          echo "内核主线分支: $MAJOR_VERSION"
          
          echo "LATEST_KERNEL_VERSION=$STABLE_VERSION" >> $GITHUB_ENV
          echo "KERNEL_MAJOR_VERSION=$MAJOR_VERSION" >> $GITHUB_ENV


      - name: 下载最新内核和 BBRv3 源码
        run: |
          # 下载最新的稳定版内核源码
          echo "正在下载 linux-${{ env.KERNEL_MAJOR_VERSION }}.y 分支..."
          git clone --depth=1 --branch linux-${{ env.KERNEL_MAJOR_VERSION }}.y https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git ./kernel_source
          
          # 下载 Google BBRv3 源码用于生成补丁
          echo "正在下载 Google BBRv3 源码..."
          git clone --depth=50 https://github.com/google/bbr.git ./bbr_source
          cd ./bbr_source
          git checkout v3
          cd ..

      - name: 生成并应用 BBRv3 补丁
        working-directory: ./kernel_source
        run: |
          echo "正在生成 BBRv3 补丁..."
          # 进入 BBR 源码目录
          cd ../bbr_source
          # 找到 BBRv3 分支与主线分支的共同祖先
          # BBRv3通常基于一个旧的rc版本，我们需要找到分叉点
          MERGE_BASE=$(git merge-base v3 HEAD)
          # 从分叉点生成到v3分支顶端的系列补丁
          git format-patch $MERGE_BASE..v3 --stdout > ../bbr_v3.patch
          cd ../kernel_source
          
          echo "正在将 BBRv3 补丁应用到最新内核..."
          # 使用 git am 应用补丁系列。如果失败，可以尝试 patch -p1 < ../bbr_v3.patch
          if git apply --check ../bbr_v3.patch; then
            git apply ../bbr_v3.patch
            echo "BBRv3 补丁应用成功！"
          else
            echo "BBRv3 补丁应用失败，请检查兼容性。" >&2
            exit 1
          fi

      - name: 准备 .config 文件
        working-directory: ./kernel_source
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            curl -sSL https://raw.githubusercontent.com/byJoey/Actions-bbr-v3/main/arm64.config > .config
            make ARCH=arm64 olddefconfig
          else
            curl -sSL https://raw.githubusercontent.com/byJoey/Actions-bbr-v3/main/x86-64.config > .config
            make olddefconfig
          fi

      - name: 构建内核软件包
        working-directory: ./kernel_source
        run: |
          CMD_PREFIX=""
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            CMD_PREFIX="ARCH=arm64"
          fi

          if [ "${{ matrix.distro }}" = "debian" ]; then
            $CMD_PREFIX make bindeb-pkg -j$(nproc) LOCALVERSION=${{ env.LOCALVERSION }}
          elif [ "${{ matrix.distro }}" = "rpm" ]; then
            $CMD_PREFIX make binrpm-pkg -j$(nproc) LOCALVERSION=${{ env.LOCALVERSION }}
          fi
          
          # 移动软件包到统一目录
          mkdir -p ../packages
          if [ "${{ matrix.distro }}" = "debian" ]; then
            mv ../*.deb ../packages/
          elif [ "${{ matrix.distro }}" = "rpm" ]; then
            find ~/rpmbuild/RPMS -name "*.rpm" -exec mv {} ../packages/ \;
          fi

      - name: 上传软件包作为构建产物
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ env.LATEST_KERNEL_VERSION }}-${{ matrix.distro }}-${{ matrix.arch }}
          path: ./packages/

      - name: 发布到 GitHub Release
        uses: softprops/action-gh-release@v0.11.6
        with:
          tag_name: v${{ env.LATEST_KERNEL_VERSION }}${{ env.LOCALVERSION }}-${{ matrix.distro }}-${{ matrix.arch }}
          body: |
            **最新稳定版内核 + Google BBRv3**

            此版本将 BBRv3 的补丁应用到了最新的稳定版内核之上。
            - **内核版本**: `${{ env.LATEST_KERNEL_VERSION }}${{ env.LOCALVERSION }}`
            - **目标架构**: `${{ matrix.arch }}`
            - **发行版**: `${{ matrix.distro }}`
            - **构建来源**: [Workflow Run #${{ github.run_number }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          files: ./packages/*
